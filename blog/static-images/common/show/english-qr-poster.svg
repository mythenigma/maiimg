<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">MaiIMG QR sharing poster</title>
  <desc id="desc">An English promotional poster for image sharing with QR access, view limits, expiry, and one direct link.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="48%" stop-color="#0c1630"/>
      <stop offset="100%" stop-color="#07101a"/>
    </linearGradient>
    <radialGradient id="purple" cx="18%" cy="12%" r="78%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyan" cx="88%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111a2c"/>
      <stop offset="100%" stop-color="#0e1727"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="rgba(255,255,255,.045)" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#020617" flood-opacity=".4"/>
    </filter>
    <style>
      .brand { font: 700 28px Inter, 'Segoe UI', Arial, sans-serif; fill: #c7d2fe; }
      .eyebrow { font: 700 18px Inter, 'Segoe UI', Arial, sans-serif; letter-spacing: 2px; fill: #7dd3fc; }
      .title { font: 800 78px Inter, 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .title2 { font: 800 78px Inter, 'Segoe UI', Arial, sans-serif; fill: #67e8f9; }
      .body { font: 400 28px Inter, 'Segoe UI', Arial, sans-serif; fill: #b6c6de; }
      .chip { font: 700 18px Inter, 'Segoe UI', Arial, sans-serif; }
      .cardTitle { font: 700 28px Inter, 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .cardCopy { font: 500 20px Inter, 'Segoe UI', Arial, sans-serif; fill: #bdd0e6; }
      .ui { font: 600 24px Inter, 'Segoe UI', Arial, sans-serif; fill: #20304c; }
      .uiSmall { font: 500 18px Inter, 'Segoe UI', Arial, sans-serif; fill: #60708e; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#grid)"/>
  <rect width="1080" height="1350" fill="url(#purple)"/>
  <rect width="1080" height="1350" fill="url(#cyan)"/>

  <text x="74" y="92" class="brand">MaiIMG</text>
  <text x="74" y="156" class="eyebrow">SCAN-FIRST SHARING</text>
  <text x="74" y="252" class="title">Upload Images</text>
  <text x="74" y="338" class="title2">Share With QR</text>
  <text x="74" y="418" class="body">One share page. One direct link.</text>
  <text x="74" y="458" class="body">Simple access rules when you need them.</text>

  <g transform="translate(74 506)">
    <rect x="0" y="0" width="166" height="48" rx="24" fill="rgba(56,189,248,.12)" stroke="rgba(56,189,248,.35)"/>
    <text x="83" y="31" text-anchor="middle" class="chip" fill="#bae6fd">One QR code</text>
    <rect x="182" y="0" width="164" height="48" rx="24" fill="rgba(99,102,241,.12)" stroke="rgba(99,102,241,.35)"/>
    <text x="264" y="31" text-anchor="middle" class="chip" fill="#c7d2fe">One clean link</text>
    <rect x="364" y="0" width="166" height="48" rx="24" fill="rgba(16,185,129,.12)" stroke="rgba(16,185,129,.35)"/>
    <text x="447" y="31" text-anchor="middle" class="chip" fill="#bbf7d0">Easy to close</text>
  </g>

  <g transform="translate(70 610)" filter="url(#shadow)">
    <rect width="620" height="560" rx="34" fill="#f7fbff"/>
    <rect x="0" y="0" width="620" height="560" rx="34" fill="none" stroke="rgba(148,163,184,.18)"/>
    <rect x="34" y="34" width="250" height="34" rx="17" fill="#ffffff"/>
    <circle cx="58" cy="51" r="7" fill="#f87171"/>
    <circle cx="80" cy="51" r="7" fill="#fbbf24"/>
    <circle cx="102" cy="51" r="7" fill="#22c55e"/>
    <text x="128" y="57" class="uiSmall">maiimg.com</text>
    <text x="34" y="108" class="uiSmall">Create one shareable gallery for your images</text>
    <rect x="34" y="132" width="552" height="72" rx="24" fill="#e4efff"/>
    <text x="62" y="174" class="ui">https://maiimg.com/gallery/AB98GHC7</text>
    <rect x="412" y="142" width="154" height="52" rx="18" fill="url(#cta)"/>
    <text x="489" y="175" text-anchor="middle" class="ui" fill="#ffffff">Copy Link</text>

    <rect x="34" y="232" width="352" height="270" rx="26" fill="#ffffff" stroke="#d9e4f5"/>
    <text x="58" y="266" class="uiSmall">Selected images</text>
    <rect x="58" y="286" width="122" height="92" rx="18" fill="#dbeafe"/>
    <rect x="194" y="286" width="122" height="92" rx="18" fill="#fde68a"/>
    <rect x="58" y="392" width="122" height="92" rx="18" fill="#bfdbfe"/>
    <rect x="194" y="392" width="122" height="92" rx="18" fill="#c7d2fe"/>
    <text x="119" y="338" text-anchor="middle" class="uiSmall" fill="#1d4ed8">image 1</text>
    <text x="255" y="338" text-anchor="middle" class="uiSmall" fill="#92400e">image 2</text>
    <text x="119" y="444" text-anchor="middle" class="uiSmall" fill="#2563eb">image 3</text>
    <text x="255" y="444" text-anchor="middle" class="uiSmall" fill="#4338ca">image 4</text>

    <rect x="410" y="232" width="176" height="270" rx="26" fill="#f8fbff" stroke="#d8e2f4"/>
    <text x="438" y="266" class="uiSmall">QR access</text>
    <rect x="438" y="294" width="120" height="120" rx="22" fill="#ffffff" stroke="#d5dff0"/>
    <path d="M460 316h22v22h-22zM490 316h12v12h-12zM460 346h12v12h-12zM488 344h14v14h-14zM472 360h22v22h-22zM520 320h18v18h-18zM520 350h10v10h-10zM538 350h12v12h-12zM518 370h20v20h-20z" fill="#111827"/>
    <text x="498" y="446" text-anchor="middle" class="uiSmall">Scan to open</text>
    <text x="438" y="480" class="uiSmall">Max opens: 5</text>
    <text x="438" y="507" class="uiSmall">Expiry: 2026-04-01</text>
  </g>

  <g transform="translate(724 610)">
    <rect width="286" height="166" rx="30" fill="url(#card)" stroke="rgba(56,189,248,.28)"/>
    <text x="28" y="56" class="cardTitle">Clear destination</text>
    <text x="28" y="94" class="cardCopy">A QR code works better when the</text>
    <text x="28" y="124" class="cardCopy">page behind it explains itself fast.</text>
  </g>
  <g transform="translate(724 798)">
    <rect width="286" height="166" rx="30" fill="url(#card)" stroke="rgba(99,102,241,.28)"/>
    <text x="28" y="56" class="cardTitle">Simple rule set</text>
    <text x="28" y="94" class="cardCopy">Open count, expiry, and revoke</text>
    <text x="28" y="124" class="cardCopy">are enough for many short shares.</text>
  </g>
  <g transform="translate(724 986)">
    <rect width="286" height="166" rx="30" fill="url(#card)" stroke="rgba(16,185,129,.28)"/>
    <text x="28" y="56" class="cardTitle">Best fit</text>
    <text x="28" y="94" class="cardCopy">Use QR on signs, posters, labels,</text>
    <text x="28" y="124" class="cardCopy">cards, and event displays.</text>
  </g>
</svg>
