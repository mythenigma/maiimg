<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">English security control board</title>
  <desc id="desc">Promotional visual showing open limits, expiry, and share revocation in a dark product-style layout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1516"/>
      <stop offset="55%" stop-color="#0d1a1e"/>
      <stop offset="100%" stop-color="#091117"/>
    </linearGradient>
    <radialGradient id="g1" cx="15%" cy="16%" r="75%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="86%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#84cc16" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf7f6"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="rgba(255,255,255,.045)" stroke-width="1"/>
    </pattern>
    <style>
      .eyebrow{font:700 18px Inter,Arial,sans-serif;letter-spacing:2px;fill:#6ee7b7}
      .headline{font:800 62px Inter,Arial,sans-serif;fill:#f8fafc}
      .headline2{font:800 62px Inter,Arial,sans-serif;fill:#a7f3d0}
      .body{font:400 26px Inter,Arial,sans-serif;fill:#b7ccc9}
      .ui{font:600 22px Inter,Arial,sans-serif;fill:#20323b}
      .uiSmall{font:500 18px Inter,Arial,sans-serif;fill:#59707a}
      .chip{font:700 18px Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect width="1400" height="860" fill="url(#grid)"/>
  <rect width="1400" height="860" fill="url(#g1)"/>
  <rect width="1400" height="860" fill="url(#g2)"/>
  <text x="78" y="110" class="eyebrow">ACCESS CONTROL</text>
  <text x="78" y="194" class="headline">Set Limits</text>
  <text x="78" y="264" class="headline2">Before You Send</text>
  <text x="78" y="338" class="body">Useful privacy usually starts with very small rules:</text>
  <text x="78" y="376" class="body">how long the share stays open, how often it can be opened,</text>
  <text x="78" y="414" class="body">and how quickly you can close it later.</text>

  <g transform="translate(78 468)">
    <rect x="0" y="0" width="164" height="46" rx="23" fill="rgba(16,185,129,.12)" stroke="rgba(16,185,129,.35)"/>
    <text x="82" y="30" text-anchor="middle" class="chip" fill="#d1fae5">Open limits</text>
    <rect x="182" y="0" width="150" height="46" rx="23" fill="rgba(45,212,191,.12)" stroke="rgba(45,212,191,.35)"/>
    <text x="257" y="30" text-anchor="middle" class="chip" fill="#ccfbf1">Expiry</text>
    <rect x="350" y="0" width="160" height="46" rx="23" fill="rgba(132,204,22,.12)" stroke="rgba(132,204,22,.35)"/>
    <text x="430" y="30" text-anchor="middle" class="chip" fill="#dcfce7">Revoke</text>
  </g>

  <g transform="translate(694 136)" filter="url(#shadow)">
    <rect width="626" height="584" rx="38" fill="url(#panel)"/>
    <rect x="0" y="0" width="626" height="584" rx="38" fill="none" stroke="rgba(148,163,184,.18)"/>
    <rect x="34" y="34" width="256" height="34" rx="17" fill="#ffffff"/>
    <circle cx="58" cy="51" r="7" fill="#f87171"/>
    <circle cx="80" cy="51" r="7" fill="#fbbf24"/>
    <circle cx="102" cy="51" r="7" fill="#22c55e"/>
    <text x="128" y="57" class="uiSmall">maiimg.com</text>

    <rect x="42" y="102" width="542" height="120" rx="28" fill="#ffffff" stroke="#d9e5ec"/>
    <text x="68" y="140" class="uiSmall">Current share rules</text>
    <rect x="68" y="160" width="150" height="34" rx="17" fill="rgba(16,185,129,.12)"/>
    <text x="143" y="183" text-anchor="middle" class="uiSmall" fill="#047857">Max opens: 5</text>
    <rect x="234" y="160" width="176" height="34" rx="17" fill="rgba(45,212,191,.12)"/>
    <text x="322" y="183" text-anchor="middle" class="uiSmall" fill="#0f766e">Expires: 2026-04-01</text>
    <rect x="426" y="160" width="132" height="34" rx="17" fill="rgba(132,204,22,.12)"/>
    <text x="492" y="183" text-anchor="middle" class="uiSmall" fill="#4d7c0f">Status: live</text>

    <rect x="42" y="252" width="246" height="272" rx="28" fill="#ffffff" stroke="#d9e5ec"/>
    <text x="68" y="288" class="uiSmall">Access board</text>
    <text x="68" y="334" class="ui">Small rules</text>
    <text x="68" y="364" class="ui">before send</text>
    <text x="68" y="402" class="uiSmall">Use limits for small audiences.</text>
    <text x="68" y="432" class="uiSmall">Use expiry for short windows.</text>
    <text x="68" y="462" class="uiSmall">Use revoke when it should stop now.</text>
    <rect x="68" y="478" width="160" height="42" rx="16" fill="url(#ok)"/>
    <text x="148" y="506" text-anchor="middle" class="ui" fill="#ffffff">Revoke</text>

    <rect x="314" y="252" width="270" height="272" rx="28" fill="#f8fbff" stroke="#d9e5ec"/>
    <text x="340" y="288" class="uiSmall">Small rule set</text>
    <rect x="340" y="318" width="218" height="54" rx="18" fill="#ffffff" stroke="#d7e1ec"/>
    <text x="366" y="351" class="uiSmall">Limit opens</text>
    <text x="530" y="351" text-anchor="end" class="ui">5</text>
    <rect x="340" y="390" width="218" height="54" rx="18" fill="#ffffff" stroke="#d7e1ec"/>
    <text x="366" y="423" class="uiSmall">Expiry date</text>
    <text x="530" y="423" text-anchor="end" class="ui">2026-04-01</text>
    <rect x="340" y="462" width="218" height="34" rx="17" fill="rgba(16,185,129,.12)"/>
    <text x="449" y="485" text-anchor="middle" class="uiSmall" fill="#047857">Enough control for short shares</text>
  </g>
</svg>
