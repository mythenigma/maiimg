<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">English link sharing card</title>
  <desc id="desc">Promotional image showing a clean share link page with clear image grouping and one direct copy link button.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1120"/>
      <stop offset="55%" stop-color="#0d1730"/>
      <stop offset="100%" stop-color="#09111b"/>
    </linearGradient>
    <radialGradient id="p" cx="14%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c" cx="84%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eaf1ff"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    </pattern>
    <style>
      .eyebrow{font:700 18px Inter,Arial,sans-serif;letter-spacing:2px;fill:#7dd3fc}
      .headline{font:800 64px Inter,Arial,sans-serif;fill:#f8fafc}
      .headline2{font:800 64px Inter,Arial,sans-serif;fill:#93c5fd}
      .body{font:400 26px Inter,Arial,sans-serif;fill:#bdd0ea}
      .ui{font:600 22px Inter,Arial,sans-serif;fill:#22324f}
      .uiSmall{font:500 18px Inter,Arial,sans-serif;fill:#5d6d88}
      .chip{font:700 18px Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect width="1400" height="860" fill="url(#grid)"/>
  <rect width="1400" height="860" fill="url(#p)"/>
  <rect width="1400" height="860" fill="url(#c)"/>
  <text x="80" y="110" class="eyebrow">DIRECT LINK SHARING</text>
  <text x="80" y="194" class="headline">Keep The Share</text>
  <text x="80" y="266" class="headline2">Simple And Clear</text>
  <text x="80" y="340" class="body">One focused image set.</text>
  <text x="80" y="378" class="body">One direct link people can open fast.</text>

  <g transform="translate(80 430)">
    <rect x="0" y="0" width="150" height="46" rx="23" fill="rgba(59,130,246,.12)" stroke="rgba(59,130,246,.35)"/>
    <text x="75" y="30" text-anchor="middle" class="chip" fill="#dbeafe">One link</text>
    <rect x="168" y="0" width="166" height="46" rx="23" fill="rgba(34,211,238,.12)" stroke="rgba(34,211,238,.35)"/>
    <text x="251" y="30" text-anchor="middle" class="chip" fill="#cffafe">Clear grouping</text>
    <rect x="352" y="0" width="160" height="46" rx="23" fill="rgba(139,92,246,.12)" stroke="rgba(139,92,246,.35)"/>
    <text x="432" y="30" text-anchor="middle" class="chip" fill="#ddd6fe">Fast to send</text>
  </g>

  <g transform="translate(696 146)" filter="url(#shadow)">
    <rect width="620" height="548" rx="36" fill="url(#panel)"/>
    <rect x="0" y="0" width="620" height="548" rx="36" fill="none" stroke="rgba(148,163,184,.18)"/>
    <rect x="34" y="30" width="252" height="34" rx="17" fill="#ffffff"/>
    <circle cx="58" cy="47" r="7" fill="#f87171"/>
    <circle cx="80" cy="47" r="7" fill="#fbbf24"/>
    <circle cx="102" cy="47" r="7" fill="#34d399"/>
    <text x="128" y="53" class="uiSmall">maiimg.com</text>

    <text x="40" y="108" class="uiSmall">Share one image set through one direct link</text>
    <rect x="40" y="132" width="350" height="56" rx="18" fill="#ffffff" stroke="#d9e2f2"/>
    <text x="66" y="167" class="uiSmall">https://maiimg.com/gallery/AB98GHC7</text>
    <rect x="418" y="132" width="162" height="56" rx="18" fill="url(#cta)"/>
    <text x="499" y="167" text-anchor="middle" class="ui" fill="#ffffff">Copy Link</text>

    <rect x="40" y="222" width="338" height="284" rx="28" fill="#ffffff" stroke="#d8e3f4"/>
    <text x="66" y="258" class="uiSmall">Selected images</text>
    <rect x="66" y="278" width="120" height="94" rx="18" fill="#dbeafe"/>
    <rect x="198" y="278" width="120" height="94" rx="18" fill="#fde68a"/>
    <rect x="66" y="388" width="120" height="94" rx="18" fill="#c7d2fe"/>
    <rect x="198" y="388" width="120" height="94" rx="18" fill="#e9d5ff"/>
    <text x="126" y="330" text-anchor="middle" class="uiSmall" fill="#1d4ed8">cover</text>
    <text x="258" y="330" text-anchor="middle" class="uiSmall" fill="#92400e">detail</text>
    <text x="126" y="440" text-anchor="middle" class="uiSmall" fill="#4338ca">detail</text>
    <text x="258" y="440" text-anchor="middle" class="uiSmall" fill="#7c3aed">detail</text>

    <rect x="408" y="222" width="172" height="130" rx="26" fill="#f8fbff" stroke="#d6e0f0"/>
    <text x="434" y="258" class="uiSmall">Why it works</text>
    <text x="434" y="298" class="ui">One entry</text>
    <text x="434" y="332" class="uiSmall">No split messages.</text>

    <rect x="408" y="376" width="172" height="130" rx="26" fill="#f8fbff" stroke="#d6e0f0"/>
    <text x="434" y="412" class="uiSmall">Good fit</text>
    <text x="434" y="448" class="ui">Reviews,</text>
    <text x="434" y="478" class="ui">handoff</text>
  </g>
</svg>
