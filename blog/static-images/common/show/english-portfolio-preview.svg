<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">English portfolio preview visual</title>
  <desc id="desc">Promotional portfolio visual showing one curated art share with a clean reading path and optional QR access.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1021"/>
      <stop offset="50%" stop-color="#121833"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <radialGradient id="p" cx="18%" cy="18%" r="75%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b" cx="82%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf8ff"/>
      <stop offset="100%" stop-color="#f0edff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    </pattern>
    <style>
      .eyebrow{font:700 18px Inter,Arial,sans-serif;letter-spacing:2px;fill:#c4b5fd}
      .headline{font:800 62px Inter,Arial,sans-serif;fill:#f8fafc}
      .headline2{font:800 62px Inter,Arial,sans-serif;fill:#d8b4fe}
      .body{font:400 26px Inter,Arial,sans-serif;fill:#c8c8ea}
      .ui{font:600 22px Inter,Arial,sans-serif;fill:#34274d}
      .uiSmall{font:500 18px Inter,Arial,sans-serif;fill:#6b5f88}
      .chip{font:700 18px Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect width="1400" height="860" fill="url(#grid)"/>
  <rect width="1400" height="860" fill="url(#p)"/>
  <rect width="1400" height="860" fill="url(#b)"/>
  <text x="78" y="110" class="eyebrow">PORTFOLIO ENTRY</text>
  <text x="78" y="194" class="headline">Curate The Work.</text>
  <text x="78" y="266" class="headline2">Then Share It Well.</text>
  <text x="78" y="340" class="body">A portfolio feels stronger when the entry point</text>
  <text x="78" y="378" class="body">looks intentional and easy to follow.</text>

  <g transform="translate(78 440)">
    <rect x="0" y="0" width="170" height="46" rx="23" fill="rgba(168,85,247,.12)" stroke="rgba(168,85,247,.35)"/>
    <text x="85" y="30" text-anchor="middle" class="chip" fill="#f3e8ff">Selected work</text>
    <rect x="188" y="0" width="174" height="46" rx="23" fill="rgba(96,165,250,.12)" stroke="rgba(96,165,250,.35)"/>
    <text x="275" y="30" text-anchor="middle" class="chip" fill="#dbeafe">One entry point</text>
    <rect x="380" y="0" width="172" height="46" rx="23" fill="rgba(34,211,238,.12)" stroke="rgba(34,211,238,.35)"/>
    <text x="466" y="30" text-anchor="middle" class="chip" fill="#cffafe">QR optional</text>
  </g>

  <g transform="translate(716 146)" filter="url(#shadow)">
    <rect width="620" height="548" rx="38" fill="url(#panel)"/>
    <rect x="0" y="0" width="620" height="548" rx="38" fill="none" stroke="rgba(148,163,184,.18)"/>
    <rect x="34" y="32" width="250" height="34" rx="17" fill="#ffffff"/>
    <circle cx="58" cy="49" r="7" fill="#f87171"/>
    <circle cx="80" cy="49" r="7" fill="#fbbf24"/>
    <circle cx="102" cy="49" r="7" fill="#34d399"/>
    <text x="128" y="55" class="uiSmall">portfolio.maiimg.com</text>

    <text x="40" y="104" class="uiSmall">Artist portfolio preview</text>
    <rect x="40" y="128" width="368" height="292" rx="30" fill="#ffffff" stroke="#e5def6"/>
    <rect x="66" y="156" width="132" height="104" rx="22" fill="#ede9fe"/>
    <rect x="214" y="156" width="168" height="104" rx="22" fill="#dbeafe"/>
    <rect x="66" y="278" width="168" height="116" rx="22" fill="#fae8ff"/>
    <rect x="252" y="278" width="130" height="116" rx="22" fill="#e0f2fe"/>
    <text x="132" y="214" text-anchor="middle" class="uiSmall" fill="#6d28d9">featured</text>
    <text x="298" y="214" text-anchor="middle" class="uiSmall" fill="#1d4ed8">series</text>
    <text x="150" y="346" text-anchor="middle" class="uiSmall" fill="#86198f">work set</text>
    <text x="317" y="346" text-anchor="middle" class="uiSmall" fill="#0369a1">detail set</text>

    <rect x="434" y="128" width="146" height="136" rx="26" fill="#ffffff" stroke="#e4dcf5"/>
    <text x="458" y="164" class="uiSmall">Portfolio note</text>
    <text x="458" y="204" class="ui">Keep it</text>
    <text x="458" y="232" class="ui">curated</text>
    <text x="458" y="256" class="uiSmall">A small set reads better.</text>

    <rect x="434" y="286" width="146" height="136" rx="26" fill="#f9f7ff" stroke="#e4dcf5"/>
    <text x="458" y="322" class="uiSmall">QR access</text>
    <rect x="458" y="342" width="58" height="58" rx="16" fill="#ffffff" stroke="#ddd6f3"/>
    <path d="M470 354h13v13h-13zM489 354h8v8h-8zM470 373h8v8h-8zM488 372h10v10h-10zM478 384h14v14h-14z" fill="#111827"/>
    <text x="528" y="370" class="uiSmall">Cards,</text>
    <text x="528" y="394" class="uiSmall">labels,</text>
    <text x="528" y="418" class="uiSmall">prints.</text>

    <rect x="40" y="448" width="540" height="64" rx="24" fill="#ffffff" stroke="#e4dcf5"/>
    <text x="68" y="487" class="ui">One clean portfolio link keeps the work easy to read.</text>
  </g>
</svg>
