<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">English share control flow</title>
  <desc id="desc">Four-step flow: set open limits, set expiry, keep sharing through one link and QR code, then revoke when the job is done.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1716"/>
      <stop offset="52%" stop-color="#0f1a22"/>
      <stop offset="100%" stop-color="#0a1219"/>
    </linearGradient>
    <radialGradient id="glowL" cx="18%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="84%" cy="22%" r="72%">
      <stop offset="0%" stop-color="#84cc16" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#132129"/>
      <stop offset="100%" stop-color="#0f1a20"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="rgba(255,255,255,.034)" stroke-width="1"/>
    </pattern>
    <style>
      .title{font:700 24px Inter, 'Segoe UI', Arial, sans-serif;fill:#f8fafc}
      .copy{font:400 15px Inter, 'Segoe UI', Arial, sans-serif;fill:#9eb2b9}
      .label{font:700 11px Inter, 'Segoe UI', Arial, sans-serif;letter-spacing:1.8px;fill:#6ee7b7}
      .cardTitle{font:700 22px Inter, 'Segoe UI', Arial, sans-serif;fill:#f8fafc}
      .cardCopy{font:400 15px Inter, 'Segoe UI', Arial, sans-serif;fill:#c2d2d7}
      .chip{font:700 12px Inter, 'Segoe UI', Arial, sans-serif;fill:#dcfce7}
      .num{font:700 13px Inter, 'Segoe UI', Arial, sans-serif;fill:#ecfeff}
      .accent{font:700 13px Inter, 'Segoe UI', Arial, sans-serif;fill:#a7f3d0}
      .trace{stroke:url(#lineGrad);stroke-width:4;stroke-linecap:round;fill:none;opacity:.95}
      .pulse{fill:#10b981;filter:url(#softGlow)}
      @keyframes dashMove { to { stroke-dashoffset: -56; } }
      .moving { stroke-dasharray: 10 14; animation: dashMove 2.2s linear infinite; }
      @keyframes pulseGlow {
        0%,100% { opacity: .45; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.12); }
      }
      .p1,.p2,.p3 { transform-box: fill-box; transform-origin: center; animation: pulseGlow 2.2s ease-in-out infinite; }
      .p2 { animation-delay: .45s; }
      .p3 { animation-delay: .9s; }
    </style>
  </defs>

  <rect width="1200" height="320" fill="transparent"/>
  <rect x="16" y="16" width="1168" height="288" rx="28" fill="url(#bg)"/>
  <rect x="16" y="16" width="1168" height="288" rx="28" fill="url(#grid)"/>
  <rect x="16" y="16" width="1168" height="288" rx="28" fill="url(#glowL)"/>
  <rect x="16" y="16" width="1168" height="288" rx="28" fill="url(#glowR)"/>
  <rect x="16" y="16" width="1168" height="288" rx="28" fill="none" stroke="rgba(255,255,255,.08)"/>

  <text class="label" x="52" y="52">CONTROL FLOW</text>
  <text class="copy" x="1118" y="52" text-anchor="end">A sent share does not have to stay open forever</text>

  <g transform="translate(52,74)">
    <rect width="248" height="150" rx="22" fill="url(#cardFill)" stroke="rgba(52,211,153,.3)"/>
    <rect x="18" y="18" width="54" height="30" rx="12" fill="rgba(52,211,153,.12)" stroke="rgba(52,211,153,.24)"/>
    <text class="num" x="45" y="38" text-anchor="middle">01</text>
    <text class="cardTitle" x="22" y="82">Set open limits</text>
    <text class="cardCopy" x="22" y="108">Decide how many times the share</text>
    <text class="cardCopy" x="22" y="131">should be opened before it stops.</text>
    <rect x="22" y="116" width="116" height="24" rx="12" fill="rgba(52,211,153,.14)"/>
    <text class="chip" x="80" y="132" text-anchor="middle">clear cap</text>
  </g>

  <g transform="translate(330,74)">
    <rect width="248" height="150" rx="22" fill="url(#cardFill)" stroke="rgba(45,212,191,.3)"/>
    <rect x="18" y="18" width="54" height="30" rx="12" fill="rgba(45,212,191,.12)" stroke="rgba(45,212,191,.24)"/>
    <text class="num" x="45" y="38" text-anchor="middle">02</text>
    <text class="cardTitle" x="22" y="82">Set expiry</text>
    <text class="cardCopy" x="22" y="108">Useful for short reviews, event shares,</text>
    <text class="cardCopy" x="22" y="131">and any temporary distribution window.</text>
    <rect x="22" y="116" width="116" height="24" rx="12" fill="rgba(45,212,191,.14)"/>
    <text class="chip" x="80" y="132" text-anchor="middle">time based</text>
  </g>

  <g transform="translate(608,74)">
    <rect width="248" height="150" rx="22" fill="url(#cardFill)" stroke="rgba(20,184,166,.32)"/>
    <rect x="18" y="18" width="54" height="30" rx="12" fill="rgba(20,184,166,.12)" stroke="rgba(20,184,166,.24)"/>
    <text class="num" x="45" y="38" text-anchor="middle">03</text>
    <text class="cardTitle" x="22" y="82">Keep sharing</text>
    <text class="cardCopy" x="22" y="108">The direct link and the QR code</text>
    <text class="cardCopy" x="22" y="131">still point to one share underneath.</text>
    <rect x="22" y="116" width="116" height="24" rx="12" fill="rgba(20,184,166,.14)"/>
    <text class="chip" x="80" y="132" text-anchor="middle">same share</text>
  </g>

  <g transform="translate(886,74)">
    <rect width="248" height="150" rx="22" fill="url(#cardFill)" stroke="rgba(132,204,22,.3)"/>
    <rect x="18" y="18" width="54" height="30" rx="12" fill="rgba(132,204,22,.12)" stroke="rgba(132,204,22,.24)"/>
    <text class="num" x="45" y="38" text-anchor="middle">04</text>
    <text class="cardTitle" x="22" y="82">Revoke access</text>
    <text class="cardCopy" x="22" y="108">When the review, campaign, or handoff</text>
    <text class="cardCopy" x="22" y="131">is over, close the share cleanly.</text>
    <rect x="22" y="116" width="116" height="24" rx="12" fill="rgba(132,204,22,.14)"/>
    <text class="chip" x="80" y="132" text-anchor="middle">clean stop</text>
  </g>

  <path class="trace" d="M300 250 H330 M578 250 H608 M856 250 H886"/>
  <path class="trace moving" d="M300 250 H330 M578 250 H608 M856 250 H886"/>
  <circle class="pulse p1" cx="315" cy="250" r="5.5"/>
  <circle class="pulse p2" cx="593" cy="250" r="5.5"/>
  <circle class="pulse p3" cx="871" cy="250" r="5.5"/>

  <text class="accent" x="52" y="280">define the cap</text>
  <text class="accent" x="330" y="280">define the time</text>
  <text class="accent" x="608" y="280">keep one path</text>
  <text class="accent" x="886" y="280">close when done</text>
</svg>
